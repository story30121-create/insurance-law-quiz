<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>保險法規題庫 v2.0</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>保險法規題庫 <span>v2.0</span></h1>
      <p id="subtitle">110春～115春，完整 500 題｜AI複習、法條搜尋、同觀念刷題、模擬考</p>
    </div>
    <button id="installBtn" class="ghost hidden">安裝</button>
  </header>

  <main>
    <section class="panel stats" id="stats"></section>

    <section class="panel filters">
      <label>模式
        <select id="mode">
          <option value="all">全部題目</option>
          <option value="smart">AI智慧複習</option>
          <option value="high">高頻題（同觀念出現 ≥ 3 次）</option>
          <option value="wrong">錯題本</option>
          <option value="bookmarked">收藏題</option>
          <option value="unseen">尚未作答</option>
          <option value="weak">弱點題（答錯率高）</option>
        </select>
      </label>
      <label>年份
        <select id="year"><option value="all">全部</option></select>
      </label>
      <label>季別
        <select id="season"><option value="all">全部</option><option value="春">春</option><option value="秋">秋</option></select>
      </label>
      <label>題型
        <select id="type"><option value="all">全部</option><option value="單選">單選</option><option value="複選">複選</option></select>
      </label>
      <label>主題
        <select id="topic"><option value="all">全部</option></select>
      </label>
      <label>法條/出處
        <select id="law"><option value="all">全部</option></select>
      </label>
      <label>搜尋
        <input id="search" placeholder="題目、選項、法條、主題" />
      </label>
      <div class="filterBtns">
        <button id="apply">開始 / 更新</button>
        <button id="shuffle" class="secondary">隨機排序</button>
        <button id="reset" class="ghost">清除篩選</button>
      </div>
    </section>

    <section class="panel planPanel">
      <div>
        <b>V2 智慧複習</b><br><span>根據高頻、錯題、低正確率與尚未作答，自動排優先順序。</span>
      </div>
      <div class="filterBtns">
        <button id="smartBtn" class="secondary">產生今日30題</button>
        <button id="planBtn" class="ghost">產生7日讀書計畫</button>
      </div>
      <div id="planBox" class="planBox hidden"></div>
    </section>

    <section class="panel examPanel">
      <div>
        <b>模擬考</b><br><span>可從目前篩選結果抽題，交卷後顯示分數與錯題。</span>
      </div>
      <div class="examControls">
        <select id="examSize"><option value="20">20 題</option><option value="50">50 題</option><option value="100">100 題</option></select>
        <button id="startExam" class="secondary">開始模擬考</button>
        <button id="submitExam" class="danger hidden">交卷</button>
        <button id="exitExam" class="ghost hidden">離開模擬考</button>
      </div>
    </section>

    <section class="panel progressBox">
      <div class="progressText"><span id="countText">0 題</span><span id="posText">第 0 / 0 題</span></div>
      <div class="bar"><div id="barFill"></div></div>
      <div id="examStatus" class="examStatus hidden"></div>
    </section>

    <section class="card" id="card">
      <div class="meta" id="meta"></div>
      <h2 id="stem">載入中...</h2>
      <div id="options" class="options"></div>
      <div class="actions">
        <button id="prev" class="secondary">上一題</button>
        <button id="check" class="secondary">確認答案</button>
        <button id="show" class="secondary">顯示答案</button>
        <button id="next">下一題</button>
      </div>
      <div id="answerBox" class="answerBox hidden"></div>
      <div class="actions smallActions">
        <button id="bookmark" class="ghost">☆ 收藏</button>
        <button id="markWrong" class="ghost">加入錯題</button>
        <button id="clearWrong" class="ghost">移出錯題</button>
        <button id="groupDrill" class="ghost">同觀念刷題</button>
      </div>
    </section>

    <section class="panel topicPanel">
      <h3>高頻主題</h3>
      <div id="topicChips" class="chips"></div>
    </section>

    <section class="panel topicPanel">
      <h3>我的主題表現</h3>
      <div id="topicStats" class="topicStats"></div>
    </section>

    <section class="panel topicPanel">
      <h3>法條/出處表現</h3>
      <div id="lawStats" class="topicStats"></div>
    </section>

    <section class="panel topicPanel">
      <h3>資料管理</h3>
      <div class="actions smallActions">
        <button id="exportData" class="ghost">匯出進度</button>
        <label class="importLabel">匯入進度<input id="importData" type="file" accept="application/json" /></label>
        <button id="clearData" class="danger">清除本機進度</button>
      </div>
    </section>
  </main>

  <footer>v2.0 新增：AI智慧複習、法條搜尋、同觀念刷題、7日讀書計畫、法條表現、鍵盤快捷鍵。資料來源：使用者上傳之 110春～115春保險法規題本與解答。</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>

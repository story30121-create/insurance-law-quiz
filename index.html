<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="保險法規題庫" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>保險法規題庫 App</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{--bg:#f4f6fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#d8dee9;--blue:#2563eb;--dark:#111827;--green:#16a34a;--red:#dc2626;--amber:#b45309;--shadow:0 10px 25px rgba(15,23,42,.08);--radius:18px}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:var(--ink)}
    header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .top{max-width:1180px;margin:0 auto;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand h1{font-size:22px;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}.pill{background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:7px 12px;font-size:13px;color:#1e40af;white-space:nowrap}
    main{max-width:1180px;margin:22px auto;padding:0 18px 60px}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.panel{padding:16px}.question{padding:20px;min-height:520px}
    label{display:block;color:var(--muted);font-size:13px;margin:14px 0 6px}select,input{width:100%;border:1px solid #cbd5e1;border-radius:11px;padding:12px;background:#fff;font-size:15px;color:var(--ink)}button{border:0;border-radius:12px;padding:12px 14px;font-size:15px;font-weight:700;cursor:pointer}.btn{background:var(--blue);color:#fff}.btn2{background:#fff;color:var(--ink);border:1px solid #cbd5e1}.btnDark{background:var(--dark);color:#fff}.btnGreen{background:var(--green);color:#fff}.btnRed{background:var(--red);color:#fff}.row{display:flex;gap:8px}.row>*{flex:1}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.stat{border:1px solid var(--line);border-radius:12px;padding:12px;background:#f8fafc}.stat small{color:var(--muted)}.stat b{display:block;font-size:22px;margin-top:4px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.tab{background:#eef2ff;color:#1e40af;border:1px solid #c7d2fe;padding:10px;font-size:14px}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .qmeta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.tag{border:1px solid #dbeafe;background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:5px 10px;font-size:12px}.tag.hot{background:#fff7ed;border-color:#fed7aa;color:#c2410c}.stem{font-size:21px;line-height:1.65;margin:14px 0 18px;white-space:pre-wrap}.options{display:grid;gap:10px}.opt{width:100%;text-align:left;background:#fff;border:1px solid #cbd5e1;border-radius:14px;padding:14px;line-height:1.55;font-weight:600;color:var(--ink)}.opt:hover{border-color:var(--blue);box-shadow:0 0 0 3px #dbeafe}.opt.selected{border-color:var(--blue);background:#eff6ff}.opt.correct{border-color:var(--green);background:#ecfdf5}.opt.wrong{border-color:var(--red);background:#fef2f2}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}.answerBox{display:none;margin-top:16px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:16px;padding:16px;line-height:1.65}.answerBox.show{display:block}.answerBox h3{margin:0 0 8px}.correctText{color:var(--green);font-weight:800}.wrongText{color:var(--red);font-weight:800}.muted{color:var(--muted)}.notice{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;border-radius:12px;padding:12px;margin-top:12px;font-size:14px;line-height:1.5}.progress{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:12px}.progress span{display:block;height:100%;width:0;background:var(--blue)}
    .list{max-height:330px;overflow:auto;display:grid;gap:8px;margin-top:12px}.mini{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;cursor:pointer}.mini b{font-size:13px}.mini p{margin:4px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty{padding:30px;text-align:center;color:var(--muted)}
    @media(max-width:850px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.actions{grid-template-columns:1fr 1fr}.stem{font-size:18px}.question{min-height:auto}.tabs{grid-template-columns:1fr 1fr}.pill{white-space:normal}}
  </style>
</head>
<body>
<header><div class="top"><div class="brand"><h1>保險法規題庫 App</h1><p>110春～115春｜500題｜高頻、重複、錯題、收藏、模擬考</p></div><div class="pill" id="summaryPill">載入中...</div></div></header>
<main><div class="grid"><aside class="card panel">
  <div class="tabs"><button class="tab active" data-mode="all">全部</button><button class="tab" data-mode="high">高頻</button><button class="tab" data-mode="wrong">錯題</button><button class="tab" data-mode="fav">收藏</button><button class="tab" data-mode="mock">模擬考</button><button class="tab" data-mode="dup">重複</button></div>
  <label>年份</label><select id="yearFilter"><option value="">全部年份</option></select>
  <label>題型</label><select id="typeFilter"><option value="">全部題型</option><option value="單選">單選</option><option value="複選">複選</option></select>
  <label>主題</label><select id="topicFilter"><option value="">全部主題</option></select>
  <label>搜尋</label><input id="searchInput" placeholder="例如：複保險、告知義務、保單價值" />
  <div class="row" style="margin-top:10px"><button class="btn" id="startBtn">開始 / 更新</button><button class="btn2" id="shuffleBtn">隨機</button></div>
  <div class="row" style="margin-top:8px"><button class="btn2" id="resetBtn">清除進度</button><button class="btn2" id="exportBtn">匯出紀錄</button></div>
  <div class="notice">複選題可選多個選項，再按「顯示答案」。錯題與收藏會存於本機瀏覽器。</div>
  <div class="stats"><div class="stat"><small>題庫總數</small><b id="totalStat">0</b></div><div class="stat"><small>本次題數</small><b id="sessionStat">0</b></div><div class="stat"><small>已答</small><b id="answeredStat">0</b></div><div class="stat"><small>正確率</small><b id="accStat">0%</b></div></div>
  <div class="progress"><span id="progressBar"></span></div>
  <div class="list" id="sideList"></div>
</aside><section class="card question">
  <div id="qArea"><div class="empty">按左側「開始 / 更新」開始刷題。</div></div>
</section></div></main>
<script src="data.js"></script>
<script src="app.js"></script>
</body></html>
